<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
<script src="./theme-flash.js?v=20260515"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="在线图片压缩工具管理后台，提供用户账户管理、压缩任务监控与系统配置功能面板。" />
  <title>管理后台 - 在线图片压缩工具，用户管理与系统配置控制面板</title>
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://www.zaixianyasuo.cn/admin.html" />
  <link rel="stylesheet" href="./shared.css?v=20260511d" />
  <style>
    .card{max-width:1100px;margin:0 auto}
    .table-wrap{overflow-x:auto;position:relative}
    table{width:100%;border-collapse:collapse;min-width:700px}
    th,td{padding:8px 6px;text-align:left;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
    tr:last-child td{border-bottom:none}
    th{background:#f8f9fb;position:sticky;top:0;z-index:1;font-size:12px;white-space:nowrap}
    /* 左侧固定：ID + 账号 */
    th:nth-child(1), td:nth-child(1){
      position:sticky;left:0;z-index:2;background:inherit;
      width:50px;min-width:50px;text-align:center;
    }
    td:nth-child(1){background:#fff}
    tr:nth-child(even) td:nth-child(1){background:#fafbfc}
    /* 右侧固定：操作 */
    th:last-child, td:last-child{
      position:sticky;right:0;z-index:2;background:inherit;
      width:200px;min-width:200px;white-space:nowrap;
    }
    td:last-child{background:#fff}
    tr:nth-child(even) td:last-child{background:#fafbfc}
    .muted{color:var(--muted)}
    .tag{display:inline-block;padding:1px 6px;border-radius:999px;font-size:11px;background:#edf2ff;color:#4f5dff;margin:1px 2px}
    .tag.red{background:#fee2e2;color:#b91c1c}
    .tag.green{background:#dcfce7;color:#166534}
    .ops{display:flex;gap:4px;flex-wrap:wrap}
    .ops a{padding:3px 7px;border-radius:5px;font-size:12px;text-decoration:none;border:1px solid var(--border);color:var(--text);white-space:nowrap;background:#fff}
    .ops a:hover{background:var(--hover,#f0f2f5)}
    .ops a.danger{color:#ef4444;border-color:#fecaca}
    .ops a.danger:hover{background:#fef2f2}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
    .toolbar > div{min-width:140px}
    input[type=text]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;outline:none;background:#fff;color:var(--text);font-size:13px}
    .info-line{font-size:11px;color:var(--muted);margin-top:2px}
    /* 弹窗 */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
    .modal-overlay.show{display:flex}
    .modal-box{background:#fff;border-radius:14px;padding:24px;max-width:480px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.18);max-height:80vh;overflow-y:auto}
    .modal-box h3{margin:0 0 16px;font-size:18px}
    .modal-box .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px;gap:12px}
    .modal-box .row:last-child{border-bottom:none}
    .modal-box .row .k{color:var(--muted);flex-shrink:0}
    .modal-box .row .v{text-align:right;word-break:break-all}
    .modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#999;line-height:1;padding:0}
    .modal-close:hover{color:#333}
    /* 夜间模式 */
    html[data-theme='dark'] th{background:#1a2332}
    html[data-theme='dark'] td:nth-child(1),html[data-theme='dark'] td:last-child{background:#1a2332}
    html[data-theme='dark'] tr:nth-child(even) td:nth-child(1),
    html[data-theme='dark'] tr:nth-child(even) td:last-child{background:#16202e}
    html[data-theme='dark'] .tag{background:#1e3a5f;color:#93c5fd}
    html[data-theme='dark'] .tag.red{background:#4a1a1a;color:#fca5a5}
    html[data-theme='dark'] .tag.green{background:#1a3a1a;color:#86efac}
    html[data-theme='dark'] .ops a{background:#1a2332;color:#e2e8f0;border-color:#283348}
    html[data-theme='dark'] .ops a:hover{background:#243044}
    html[data-theme='dark'] .ops a.danger{color:#fca5a5;border-color:#4a1a1a}
    html[data-theme='dark'] .ops a.danger:hover{background:#3b1a1a}
    html[data-theme='dark'] input[type=text]{background:#1a2332;border-color:#283348;color:#e2e8f0}
    html[data-theme='dark'] .modal-box{background:#1a2332;box-shadow:0 8px 40px rgba(0,0,0,.5)}
    html[data-theme='dark'] .modal-box .row{border-bottom-color:#283348}
    html[data-theme='dark'] .modal-close{color:#8899b4}
    html[data-theme='dark'] .modal-close:hover{color:#e2e8f0}
    html[data-theme='dark'] .footer{color:#8899b4!important}
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand"><div class="logo"></div><b>ImageCompress</b></div>
      <div class="nav-links">
        <a href="javascript:;" id="nav-home">首页</a>
        <a href="./changelog.html">更新日志</a>
        <a href="javascript:;" id="nav-profile">个人信息</a>
        <a href="javascript:;" id="nav-logout">注销登录</a>
      </div>
    </div>

    <section class="card">
      <h1 style="margin:0 0 6px;font-size:20px">管理员后台</h1>
      <div class="muted" style="margin-bottom:12px">支持：查询所有用户、锁定/解锁、激活/停用、删除用户（注销）。</div>

      <div class="toolbar">
        <div>
          <label>搜索（用户名/邮箱/昵称）</label>
          <input id="q" type="text" placeholder="输入关键字" />
        </div>
        <div style="width:140px">
          <label>页码</label>
          <input id="page" type="text" value="1" />
        </div>
        <div style="width:140px">
          <label>每页数量</label>
          <input id="page_size" type="text" value="50" />
        </div>
        <div style="min-width:140px">
          <button id="btn-refresh" class="btn">刷新列表</button>
        </div>
      </div>

      <div id="msg" class="status" style="margin-top:10px"></div>

      <div class="table-wrap" style="margin-top:12px">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>账号 / 昵称</th>
              <th>邮箱</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div id="pager-bottom" style="margin-top:14px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap">
        <button id="btn-first" class="btn gray" style="min-width:60px">首页</button>
        <button id="btn-prev" class="btn" style="min-width:80px">上一页</button>
        <span style="font-size:14px;color:var(--muted)">
          第 <input id="page-jump" type="text" style="width:50px;text-align:center;padding:4px 6px;border:1px solid var(--border);border-radius:6px" /> / <span id="total-pages">1</span> 页
        </span>
        <button id="btn-go" class="btn" style="min-width:60px">跳转</button>
        <button id="btn-next" class="btn" style="min-width:80px">下一页</button>
        <button id="btn-last" class="btn gray" style="min-width:60px">末页</button>
      </div>
      <div class="muted" id="footer" style="margin-top:10px;text-align:center"></div>
    </section>

    <!-- 用户详情弹窗 -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-box">
        <button class="modal-close" id="modal-close">&times;</button>
        <h3>用户详情</h3>
        <div id="modal-body"></div>
      </div>
    </div>

    <div class="footer" style="margin:28px 0 8px;text-align:center;color:#9aa3b2;font-size:12px">
      <nav style="margin-bottom:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:4px 14px">
        <a href="./" style="color:#9aa3b2;text-decoration:none">首页</a>
        <a href="./bg-change.html" style="color:#9aa3b2;text-decoration:none">证件照换底色</a>
        <a href="./watermark-remover.html" style="color:#9aa3b2;text-decoration:none">去水印</a>
        <a href="./changelog.html" style="color:#9aa3b2;text-decoration:none">更新日志</a>
        <a href="./feedback.html" style="color:#9aa3b2;text-decoration:none">反馈</a>
        <a href="./donate.html" style="color:#9aa3b2;text-decoration:none">赞助</a>
        <a href="./about.html" style="color:#9aa3b2;text-decoration:none">关于</a>
        <a href="./privacy.html" style="color:#9aa3b2;text-decoration:none">隐私政策</a>
      </nav>
      © 2025 ImageCompress. 版权所有。 <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none;">赣ICP备2025079690号-1</a>
    </div>
  </div>

  <script>
    (function(){
      function isFile(){ return location.protocol==='file:'; }
      function goto(p){ location.href = isFile()? ('./'+p) : ('/'+p); }
      function getQS(k){ try{ return new URLSearchParams(location.search).get(k); }catch(e){ return null; } }

      const forced = getQS('api');
      const cached = (function(){ try{ return localStorage.getItem('api_base'); }catch(e){ return null; } })();
      const API_BASE = !isFile() ? (forced && forced!=='self'? forced : '') : (forced || cached || 'http://127.0.0.1:8001');

      const token = (function(){ try{return localStorage.getItem('token')||'';}catch(e){return '';} })();
      function headers(extra){
        return { ...(extra||{}), ...(token? { 'Authorization':'Bearer '+token }: {}) };
      }
      function escapeHtml(value){
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
      function msg(t,isErr){ var el=document.getElementById('msg'); if(!el) return; el.textContent=t||''; el.style.color=isErr?'#f87171':''; }

      async function api(path, opts){
        const res = await fetch(API_BASE + path, { ...(opts||{}), headers: headers((opts||{}).headers) });
        if(res.status===401 || res.status===403){
          msg('未登录或无权限，请使用管理员账号登录', true);
          setTimeout(()=>goto('login.html'), 800);
          throw new Error('unauthorized');
        }
        if(!res.ok){
          let d='';
          try{ const j=await res.json(); d=j.detail||JSON.stringify(j); }catch{ try{ d=await res.text(); }catch{} }
          throw new Error(d || (res.status+':'+res.statusText));
        }
        const ct = res.headers.get('content-type') || '';
        return ct.includes('application/json') ? res.json() : res.text();
      }

      // nav
      document.getElementById('nav-home')?.addEventListener('click',()=>goto('index.html'));
      document.getElementById('nav-profile')?.addEventListener('click',()=>goto('profile.html'));
      document.getElementById('nav-logout')?.addEventListener('click',()=>{ try{localStorage.removeItem('token');}catch(e){} goto('login.html'); });

      // guard: must be admin
      (async function(){
        if(!token){ msg('请先登录管理员账号', true); setTimeout(()=>goto('login.html'), 600); return; }
        try{
          const me = await api('/api/v1/auth/me-admin');
          if(!me || !me.is_admin){ msg('当前账号不是管理员，无法访问后台', true); setTimeout(()=>goto('index.html'), 800); return; }
        }catch(e){ /* handled */ }
      })();

      function qsVal(id){ return (document.getElementById(id)?.value || '').trim(); }
      function numVal(id, def){
        const v = qsVal(id);
        const n = parseInt(v,10);
        return Number.isFinite(n) && n>0 ? n : def;
      }

      function fmt(t){ if(!t) return '-'; try{ return new Date(t).toLocaleString(); }catch(e){ return String(t); } }

      async function refresh(){
        try{
          const q = qsVal('q');
          const page = numVal('page', 1);
          const page_size = numVal('page_size', 50);
          const params = new URLSearchParams();
          if(q) params.set('q', q);
          params.set('page', String(page));
          params.set('page_size', String(page_size));
          const data = await api('/api/v1/admin/users?' + params.toString(), { method:'GET' });

          const tbody = document.getElementById('tbody');
          const footer = document.getElementById('footer');
          if(!tbody) return;

          const items = (data && data.items) || [];
          __totalPages = Math.ceil((data.total || 0) / (data.page_size || __pageSize));
          __currentPage = data.page || __currentPage;

          updatePager();
          tbody.innerHTML = items.map(u=>{
            const tags = [];
            tags.push(u.is_admin ? '<span class="tag">管理员</span>' : '<span class="tag">普通用户</span>');
            if(u.is_active){
              tags.push('<span class="tag green">启用</span>');
            } else {
              tags.push('<span class="tag red">停用</span>');
            }
            if(u.locked_until) tags.push('<span class="tag red">锁定</span>');
            const username = escapeHtml(u.username || '-');
            const nickname = escapeHtml(u.nickname || '');
            const email = escapeHtml(u.email || '-');
            const createdAt = escapeHtml(fmt(u.created_at));

            return `
              <tr data-id="${u.id}">
                <td>${u.id}</td>
                <td>
                  <b>${username}</b>
                  ${nickname ? '<span class="muted" style="margin-left:6px">'+nickname+'</span>' : ''}
                  <div class="info-line">创建: ${createdAt}</div>
                </td>
                <td><span class="muted">${email}</span></td>
                <td>${tags.join(' ')}</td>
                <td>
                  <div class="ops">
                    <a href="javascript:;" data-act="status">查询</a>
                    <a href="javascript:;" data-act="lock">锁定</a>
                    <a href="javascript:;" data-act="unlock">解锁</a>
                    <a href="javascript:;" data-act="activate">激活</a>
                    <a href="javascript:;" data-act="deactivate">停用</a>
                    <a href="javascript:;" data-act="delete" class="danger">删除</a>
                  </div>
                </td>
              </tr>
            `;
          }).join('');

          if(footer){ footer.textContent = `共 ${data.total||0} 条，当前第 ${data.page||page} 页，每页 ${data.page_size||page_size} 条`; }
          msg('加载成功');
        }catch(e){
          msg('加载失败：'+e.message, true);
        }
      }

      let __currentPage = 1;
      let __totalPages = 1;
      let __pageSize = 50;

      function getPage(){ return numVal('page', 1); }
      function getPageSize(){ return numVal('page_size', 50); }

      function updatePager(){
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnFirst = document.getElementById('btn-first');
        const btnLast = document.getElementById('btn-last');
        const elTotal = document.getElementById('total-pages');
        const elJump = document.getElementById('page-jump');
        if(btnPrev) btnPrev.disabled = (__currentPage <= 1);
        if(btnNext) btnNext.disabled = (__currentPage >= __totalPages);
        if(btnFirst) btnFirst.disabled = (__currentPage <= 1);
        if(btnLast) btnLast.disabled = (__currentPage >= __totalPages);
        if(elTotal) elTotal.textContent = String(__totalPages);
        if(elJump){ elJump.value = String(__currentPage); elJump.max = String(__totalPages); }
      }

      function goPage(p){
        p = Math.max(1, Math.min(p, __totalPages));
        if(p !== __currentPage){
          document.getElementById('page').value = String(p);
          __currentPage = p;
          refresh();
        }
      }

      document.getElementById('btn-prev')?.addEventListener('click', ()=> goPage(__currentPage - 1));
      document.getElementById('btn-next')?.addEventListener('click', ()=> goPage(__currentPage + 1));
      document.getElementById('btn-first')?.addEventListener('click', ()=> goPage(1));
      document.getElementById('btn-last')?.addEventListener('click', ()=> goPage(__totalPages));
      document.getElementById('btn-go')?.addEventListener('click', ()=>{
        const v = parseInt(document.getElementById('page-jump')?.value, 10);
        if(Number.isFinite(v)) goPage(v);
      });
      document.getElementById('page-jump')?.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter') document.getElementById('btn-go')?.click();
      });

      document.getElementById('btn-refresh')?.addEventListener('click', ()=>{
        __pageSize = getPageSize();
        __currentPage = getPage();
        refresh();
      });

      __pageSize = getPageSize();
      __currentPage = getPage();

      document.getElementById('tbody')?.addEventListener('click', async (e)=>{
        const a = e.target.closest('a[data-act]');
        if(!a) return;
        const tr = e.target.closest('tr[data-id]');
        if(!tr) return;
        const id = Number(tr.dataset.id);
        const act = a.dataset.act;

        try{
          if(act==='status'){
            const r = await api(`/api/v1/admin/users/${id}/status`, { method:'GET' });
            showUserDetail(r);
          } else if(act==='lock'){
            // 仅管理员页面显示：不使用 prompt，改为固定 30 分钟（如需可改为输入框）
            const minutes = 30;
            const r = await api(`/api/v1/admin/users/${id}/lock?minutes=${encodeURIComponent(String(minutes))}`, { method:'POST' });
            msg(r.message||'已锁定');
            await refresh();
          } else if(act==='unlock'){
            const r = await api(`/api/v1/admin/users/${id}/unlock`, { method:'POST' });
            msg(r.message||'已解锁');
            await refresh();
          } else if(act==='activate'){
            const r = await api(`/api/v1/admin/users/${id}/activate`, { method:'POST' });
            msg(r.message||'已激活');
            await refresh();
          } else if(act==='deactivate'){
            const r = await api(`/api/v1/admin/users/${id}/deactivate`, { method:'POST' });
            msg(r.message||'已停用');
            await refresh();
          } else if(act==='delete'){
            // 仅管理员页面显示：不使用 confirm，改为二次点击删除（简化为直接删除）
            const r = await api(`/api/v1/admin/users/${id}`, { method:'DELETE' });
            msg('已删除用户：'+(r.deleted_user_id||id));
            await refresh();
          }
        }catch(err){
          msg('操作失败：'+err.message, true);
        }
      });

      // ---- 弹窗 ----
      function showModal(html){
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('modal-overlay').classList.add('show');
      }
      function hideModal(){
        document.getElementById('modal-overlay').classList.remove('show');
      }
      document.getElementById('modal-close')?.addEventListener('click', hideModal);
      document.getElementById('modal-overlay')?.addEventListener('click', function(e){
        if(e.target === this) hideModal();
      });

      function showUserDetail(u){
        const rows = [
          ['用户ID', escapeHtml(String(u.user_id||'-'))],
          ['账号', escapeHtml(u.username||'-')],
          ['昵称', escapeHtml(u.nickname||'-')],
          ['邮箱', escapeHtml(u.email||'-')],
          ['角色', u.is_admin ? '管理员' : '普通用户'],
          ['状态', u.is_active ? '启用' : '停用'],
          ['失败登录次数', String(u.failed_login_attempts||0)],
          ['锁定至', u.locked_until ? fmt(u.locked_until) : '无'],
          ['最后登录', fmt(u.last_login)],
          ['创建时间', fmt(u.created_at)],
        ];
        const html = rows.map(([k,v]) =>
          `<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`
        ).join('');
        showModal(html);
      }

      // auto load
      refresh().then(() => updatePager());

    })();
  </script>
