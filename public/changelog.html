    .changelog{max-width:860px;margin:0 auto}
    .entry{margin-bottom:28px}
    .entry-date{font-size:13px;color:var(--muted);margin-bottom:4px}
    .entry-title{font-size:20px;font-weight:700;margin-bottom:10px}
    .change-list{list-style:none;padding:0;margin:0}
    .change-list li{padding:6px 0;border-bottom:1px solid #f3f4f6;display:flex;align-items:flex-start;gap:10px;font-size:14px}
    .change-list li:last-child{border-bottom:none}
    .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;flex-shrink:0;min-width:44px;text-align:center}
    .badge.feature{background:#dcfce7;color:#166534}
    .badge.fix{background:#fee2e2;color:#b91c1c}
    .badge.improve{background:#edf2ff;color:#4f5dff}
    .badge.security{background:#fef3c7;color:#92400e}
    .empty{text-align:center;padding:60px 0;color:var(--muted)}
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand"><div class="logo"></div><b>ImageCompress</b></div>

    <section class="changelog">
      <h1 style="margin:0 0 6px">更新日志</h1>
      <div class="muted" style="margin-bottom:24px">记录每次功能更新、优化和问题修复</div>
      <div id="log-container"></div>
    </section>

    <div class="footer" style="margin:28px 0 8px;text-align:center;color:#9aa3b2;font-size:12px">
      <nav style="margin-bottom:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:4px 14px">

  </div>

  <script>
    (function(){
      var BADGE = {
        feature: '<span class="badge feature">新增</span>',
        fix: '<span class="badge fix">修复</span>',
        improve: '<span class="badge improve">优化</span>',
        security: '<span class="badge security">安全</span>'
      };

      fetch('./changelog.json')
        .then(function(r){ return r.json(); })
        .then(function(data){
          var c = document.getElementById('log-container');
          if(!data || !data.length){
            c.innerHTML = '<div class="empty">暂无更新日志</div>';
            return;
          }
          c.innerHTML = data.map(function(entry){
            var items = (entry.changes||[]).map(function(ch){
              return '<li>'+(BADGE[ch.type]||'')+'<span>'+ch.desc+'</span></li>';
            }).join('');
            return '<div class="entry">'+
              '<div class="entry-date">'+entry.date+'</div>'+
              '<div class="entry-title">'+entry.title+'</div>'+
              '<ul class="change-list">'+items+'</ul>'+
            '</div>';
          }).join('');
        })
        .catch(function(){
          document.getElementById('log-container').innerHTML = '<div class="empty">加载失败，请稍后重试</div>';
        });
    })();
  </script>
  <script src="./theme.js?v=20260203"></script>
  <script src="./spark.js?v=20260515" defer></script>
  <script src="./stars.js?v=20260511b" defer></script>
</body>
