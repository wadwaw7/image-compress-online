  <!-- 动态加载 app.v2.js，复用已有逻辑；并在加载后补充“登录后展示信息”的逻辑 -->
  <script>
    (function(){
      var s=document.createElement('script');
      s.src=(location.protocol==='file:'? './app.js?v=20260511b':'/app.js?v=20260511b');
      s.onload=function(){
        var go=document.getElementById('goto-register');
        if(go){ go.addEventListener('click', function(){ location.href=(location.protocol==='file:'? './register.html':'/register.html'); }); }
        var fp=document.querySelector('a[href="./forgot-password.html"]');
        if(fp){ fp.addEventListener('click', function(e){ e.preventDefault(); location.href=(location.protocol==='file:'? './forgot-password.html':'/forgot-password.html'); }); }
        var meBox=document.getElementById('me');
        var authBox=document.getElementById('auth');
        var meInfo=document.getElementById('me-info');
        var btnLogout2=document.getElementById('btn-logout2');
        if(btnLogout2){ btnLogout2.addEventListener('click', function(){ localStorage.removeItem('token'); location.reload(); }); }
        function hasToken(){ try{return !!localStorage.getItem('token');}catch(e){return false;} }
        async function loadMe(){
          if(!hasToken()) return;
          try{
            const r = await fetch((window.API_BASE||'') + '/api/v1/auth/me', { headers: { 'Authorization': 'Bearer '+localStorage.getItem('token') }});
            if(r.ok){
              const u = await r.json();
              meInfo.textContent = 'ID:'+u.id+' | 账号:'+u.username + (u.nickname?(' | 昵称:'+u.nickname):'') + (u.email?(' | 邮箱:'+u.email):'');
              if(authBox) authBox.style.display='none';
              if(meBox) meBox.style.display='block';
            }
          }catch(e){}
        }
        loadMe();
      };
      document.head.appendChild(s);
      var home=document.getElementById('nav-home');
      if(home){ home.addEventListener('click',function(){ location.href=(location.protocol==='file:'? './index.html':'/'); }); }
    })();
  </script>
