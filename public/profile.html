    .card{max-width:820px;margin:0 auto}
    .item{display:flex;gap:8px;margin:8px 0;align-items:flex-start}
    .label{color:var(--muted);width:140px;flex:0 0 auto}
    .val{min-width:0;word-break:break-all}
    .muted{color:var(--muted)}
    .form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-top:8px}
    input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;background:#fff;color:var(--text)}

<body>
  <div class="container">
    <div class="nav">
      <div class="brand"><div class="logo"></div><b>ImageCompress</b></div>
      <div class="nav-links">
        <a href="javascript:;" id="nav-home">首页</a>
        <a href="javascript:;" id="nav-logout">注销登录</a>
      </div>
    </div>

    <section class="card">
      <h1 style="margin:0 0 8px;font-size:20px">个人用户信息</h1>
      <div id="info">
        <div class="item"><div class="label">用户ID</div><div id="u-id" class="val skeleton" style="width:120px">&nbsp;</div></div>
        <div class="item"><div class="label">账号</div><div id="u-username" class="val skeleton" style="width:220px">&nbsp;</div></div>
        <div class="item"><div class="label">呢称</div><div id="u-nickname" class="val skeleton" style="width:180px">&nbsp;</div></div>
        <div class="item"><div class="label">邮箱</div><div><div id="u-email" class="val skeleton" style="width:260px">&nbsp;</div><div id="email-tip" class="muted" style="margin-top:4px;font-size:12px"></div></div></div>
        <div class="item"><div class="label">创建时间</div><div id="u-created" class="val skeleton" style="width:220px">&nbsp;</div></div>
        <div class="item"><div class="label">最近登录</div><div id="u-last" class="val skeleton" style="width:220px">&nbsp;</div></div>
      </div>

      <hr style="border:none;border-top:1px solid var(--border);margin:14px 0" />

      <h3 style="margin:0 0 6px">绑定 / 修改邮箱</h3>
      <div class="muted" style="font-size:12px">说明：邮箱用于找回密码；绑定或修改邮箱前，请先向新邮箱发送验证码，并在下方填写验证码后保存。</div>

      <div class="form-row">
        <div style="flex:1;min-width:240px">
          <label>新邮箱</label>
          <input id="new-email" type="text" placeholder="name@example.com" />
        </div>
        <div style="width:180px">
          <label>验证码（修改时需要）</label>
          <input id="email-code" type="text" placeholder="6位验证码" />
        </div>
        <div class="stack" style="margin-top:22px">
          <button id="btn-send-code" class="btn light">发送验证码</button>
          <button id="btn-bind-email" class="btn">保存邮箱</button>
        </div>
      </div>

      <div id="msg" class="status" style="margin-top:8px"></div>

      <div class="stack" style="margin-top:12px">
        <button id="btn-logout" class="btn">注销登录</button>
        <button id="btn-delete" class="btn danger">注销账号（不可恢复）</button>
        <a class="btn" href="./index.html" style="background:#3b3f4b">返回首页</a>
      </div>
    </section>

    <div class="footer" style="margin:28px 0 8px;text-align:center;color:#9aa3b2;font-size:12px">
      <nav style="margin-bottom:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:4px 14px">
        <a href="./" style="color:#9aa3b2;text-decoration:none">首页</a>
        <a href="./bg-change.html" style="color:#9aa3b2;text-decoration:none">证件照换底色</a>
        <a href="./watermark-remover.html" style="color:#9aa3b2;text-decoration:none">去水印</a>
        <a href="./changelog.html" style="color:#9aa3b2;text-decoration:none">更新日志</a>
        <a href="./feedback.html" style="color:#9aa3b2;text-decoration:none">反馈</a>
        <a href="./donate.html" style="color:#9aa3b2;text-decoration:none">赞助</a>
        <a href="./about.html" style="color:#9aa3b2;text-decoration:none">关于</a>
        <a href="./privacy.html" style="color:#9aa3b2;text-decoration:none">隐私政策</a>
      </nav>

    </div>
  </div>

  <script>
    (function(){
      function isFile(){ return location.protocol==='file:'; }
      function getQS(k){ try{ return new URLSearchParams(location.search).get(k); }catch(e){ return null; } }
      const forced = getQS('api');
      const cached = (function(){ try{ return localStorage.getItem('api_base'); }catch(e){ return null; } })();
      const API_BASE = !isFile() ? (forced && forced!=='self'? forced : '') : (forced || cached || 'http://127.0.0.1:8001');
      const token = (function(){ try{return localStorage.getItem('token')||'';}catch(e){return '';} })();
      function headers(){ return token? { 'Authorization':'Bearer '+token } : {}; }
      function msg(t,isErr){ var el=document.getElementById('msg'); if(!el) return; el.textContent=t||''; el.style.color=isErr?'#f87171':''; }
      function fmt(t){ if(!t) return '-'; try{ return new Date(t).toLocaleString(); }catch(e){ return t; } }
      function isRealEmail(e){ e=(e||'').trim().toLowerCase(); return e && e.includes('@') && !e.endsWith('@local'); }

      function goto(p){ location.href = isFile()? ('./'+p) : ('/'+p); }
      document.getElementById('nav-home')?.addEventListener('click',()=>goto('index.html'));
      document.getElementById('nav-logout')?.addEventListener('click',()=>{ localStorage.removeItem('token'); goto('login.html'); });
      document.getElementById('btn-logout')?.addEventListener('click',()=>{ localStorage.removeItem('token'); goto('login.html'); });

      document.getElementById('btn-delete')?.addEventListener('click', async ()=>{
        if(!confirm('确定要注销并删除该账号吗？该操作不可恢复。')) return;
        try{
          const r = await fetch(API_BASE + '/api/v1/auth/me', { method:'DELETE', headers: headers() });
          if(!r.ok){ let d=''; try{const j=await r.json(); d=j.detail||JSON.stringify(j)}catch{try{d=await r.text()}catch{}}; throw new Error(d||r.status+':'+r.statusText);}
          localStorage.removeItem('token');
          msg('账号已删除，可使用相同账号再次注册');
          setTimeout(()=>{ goto('register.html'); }, 800);
        }catch(e){ msg('注销账号失败：'+e.message, true); }
      });

      async function loadMe(){
        try{
          if(!token){ goto('login.html'); return; }
          const r = await fetch(API_BASE + '/api/v1/auth/me', { headers: headers(), cache:'no-store' });
          if(!r.ok){ localStorage.removeItem('token'); goto('login.html'); return; }
          const u = await r.json();
          function fill(id, val){ var el=document.getElementById(id); if(!el) return; el.textContent = val; el.classList.remove('skeleton'); }
          fill('u-id', u.id);
          fill('u-username', u.username||'-');
          fill('u-nickname', u.nickname||'-');
          fill('u-email', u.email||'-');
          fill('u-created', fmt(u.created_at));
          fill('u-last', fmt(u.last_login));

          const tip = document.getElementById('email-tip');
          
          const codeWrap = document.getElementById('email-code')?.parentElement;
          const sendBtn = document.getElementById('btn-send-code');
          // 当前邮箱是否为真实邮箱（非 @local）
          const hasReal = !!(u.email && isRealEmail(u.email));

          // 统一规则：绑定/修改邮箱都需要验证码
          if(codeWrap) codeWrap.style.display = 'block';
          if(sendBtn) sendBtn.style.display = 'inline-block';

          if(tip){
            if(!u.email || !isRealEmail(u.email)){
              tip.textContent = '当前未绑定真实邮箱（建议绑定用于找回密码）。绑定时请先发送验证码，然后输入验证码保存。';
            }else{
              tip.textContent = '已绑定真实邮箱；修改邮箱前请先向新邮箱发送验证码，并输入验证码后保存。';
            }
          }
        }catch(e){ msg('加载信息失败：'+(e.message||e), true); }
      }

      document.getElementById('btn-send-code')?.addEventListener('click', async ()=>{
        try{
          const email = (document.getElementById('new-email')?.value || '').trim();
          if(!isRealEmail(email)){ msg('请输入真实邮箱', true); return; }
          const r = await fetch(API_BASE + '/api/v1/auth/send-email-code', {
            method:'POST',
            headers: { ...headers(), 'Content-Type':'application/json' },
            body: JSON.stringify({ email })
          });
          if(!r.ok){ let d=''; try{const j=await r.json(); d=j.detail||JSON.stringify(j)}catch{try{d=await r.text()}catch{}}; throw new Error(d||r.status+':'+r.statusText); }
          msg('验证码已发送到新邮箱，请查收（有效期5分钟）');
        }catch(e){ msg('发送失败：'+e.message, true); }
      });

      document.getElementById('btn-bind-email')?.addEventListener('click', async ()=>{
        const email = (document.getElementById('new-email')?.value || '').trim();
        const code = (document.getElementById('email-code')?.value || '').trim();
        if(!isRealEmail(email)){ msg('请输入真实邮箱', true); return; }
        if(!code){ msg('请输入邮箱验证码', true); return; }
        try{
          const bindUrl = (API_BASE + '/api/v1/auth/bind-email?code=' + encodeURIComponent(String(code).trim()));
          const r = await fetch(bindUrl, {
            method:'POST',
            headers: { ...headers(), 'Content-Type':'application/json' },
            body: JSON.stringify({ email })
          });
          if(!r.ok){ let d=''; try{const j=await r.json(); d=j.detail||JSON.stringify(j)}catch{try{d=await r.text()}catch{}}; throw new Error(d||r.status+':'+r.statusText); }
          msg('邮箱已保存成功');
          await loadMe();
        }catch(e){ msg('保存失败：'+e.message, true); }
      });

      loadMe();
    })();
  </script>
