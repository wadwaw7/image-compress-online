    <section class="card">
      <h1 style="margin:0 0 8px;font-size:20px">找回密码</h1>
      <div class="muted">请输入你绑定的邮箱，我们会发送重置密码链接到该邮箱（链接有效期 30 分钟）。</div>

      <div style="margin-top:12px">
        <label>邮箱</label>
        <input id="email" type="text" placeholder="name@example.com" />
      </div>

      <div class="stack" style="margin-top:12px">
        <button id="btn-send" class="btn">发送重置邮件</button>
        <a class="btn gray" href="./login.html" style="text-decoration:none">返回登录</a>
      </div>
      <div id="msg" class="status" style="margin-top:8px"></div>
    </section>

    <div class="footer" style="margin:28px 0 8px;text-align:center;color:#9aa3b2;font-size:12px">
      <nav style="margin-bottom:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:4px 14px">

  <script>
    (function(){
      function isFile(){ return location.protocol==='file:'; }
      function goto(p){ location.href = isFile()? ('./'+p) : ('/'+p); }
      function getQS(k){ try{ return new URLSearchParams(location.search).get(k); }catch(e){ return null; } }
      const forced = getQS('api');
      const cached = (function(){ try{ return localStorage.getItem('api_base'); }catch(e){ return null; } })();
      const API_BASE = !isFile() ? (forced && forced!=='self'? forced : '') : (forced || cached || 'http://127.0.0.1:8001');

      document.getElementById('nav-home')?.addEventListener('click', ()=>goto('index.html'));
      document.getElementById('nav-login')?.addEventListener('click', ()=>goto('login.html'));

      function msg(t,isErr){ var el=document.getElementById('msg'); if(!el) return; el.textContent=t||''; el.style.color=isErr?'#f87171':''; }

      document.getElementById('btn-send')?.addEventListener('click', async ()=>{
        const email = (document.getElementById('email')?.value || '').trim();
        if(!email || email.indexOf('@')<0){ msg('请输入正确的邮箱地址', true); return; }
        try{
          const r = await fetch(API_BASE + '/api/v1/auth/forgot-password', {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ email })
          });
          // 为避免暴露账号存在性，后端始终返回 ok
          if(!r.ok){
            let d='';
            try{ const j=await r.json(); d=j.detail||JSON.stringify(j);}catch{ try{d=await r.text();}catch{}}
            throw new Error(d||r.status+':'+r.statusText);
          }
          msg('如果该邮箱已绑定账号，我们已发送重置链接，请查收邮件。');
        }catch(e){ msg('发送失败：'+e.message, true); }
      });
    })();
  </script>
