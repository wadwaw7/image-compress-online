  <div class="container">
    <div class="nav">
      <div class="brand"><div class="logo"></div><b>ImageCompress</b></div>
      <div class="nav-links">
        <a href="javascript:;" id="nav-home">首页</a>
        <a href="javascript:;" id="nav-login">去登录</a>
      </div>
    </div>

    <section class="card">
      <h1 style="margin:0 0 8px;font-size:20px">重置密码</h1>
      <div class="muted">请设置新密码（至少 8 位）。</div>

      <div style="margin-top:12px">
        <label>新密码</label>
        <input id="pw" type="password" placeholder="至少 8 位" />
      </div>
      <div style="margin-top:10px">
        <label>确认新密码</label>
        <input id="pw2" type="password" placeholder="再次输入" />
      </div>

      <div class="stack" style="margin-top:12px">
        <button id="btn-reset" class="btn">确认重置</button>
        <a class="btn gray" href="./login.html" style="text-decoration:none">返回登录</a>
      </div>
      <div id="msg" class="status" style="margin-top:8px"></div>

      <div class="muted" style="margin-top:12px;font-size:12px">提示：本页面需要带上 <code>?token=...</code> 参数打开。</div>
    </section>

    <div class="footer" style="margin:28px 0 8px;text-align:center;color:#9aa3b2;font-size:12px">

  <script>
    (function(){
      function isFile(){ return location.protocol==='file:'; }
      function goto(p){ location.href = isFile()? ('./'+p) : ('/'+p); }
      function getQS(k){ try{ return new URLSearchParams(location.search).get(k); }catch(e){ return null; } }
      const forced = getQS('api');
      const cached = (function(){ try{ return localStorage.getItem('api_base'); }catch(e){ return null; } })();
      const API_BASE = !isFile() ? (forced && forced!=='self'? forced : '') : (forced || cached || 'http://127.0.0.1:8001');

      document.getElementById('nav-home')?.addEventListener('click', ()=>goto('index.html'));
      document.getElementById('nav-login')?.addEventListener('click', ()=>goto('login.html'));

      function msg(t,isErr){ var el=document.getElementById('msg'); if(!el) return; el.textContent=t||''; el.style.color=isErr?'#f87171':''; }

      const token = getQS('token') || '';
      if(!token){ msg('缺少 token，请从邮件链接打开本页面', true); }

      document.getElementById('btn-reset')?.addEventListener('click', async ()=>{
        if(!token){ msg('缺少 token', true); return; }
        const pw = (document.getElementById('pw')?.value || '');
        const pw2 = (document.getElementById('pw2')?.value || '');
        if(!pw || pw.length < 8){ msg('新密码至少 8 位', true); return; }
        if(pw !== pw2){ msg('两次输入的密码不一致', true); return; }

        try{
          const r = await fetch(API_BASE + '/api/v1/auth/reset-password', {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ token: token, new_password: pw })
          });
          if(!r.ok){
            let d='';
            try{ const j=await r.json(); d=j.detail||JSON.stringify(j);}catch{ try{d=await r.text();}catch{}}
            throw new Error(d||r.status+':'+r.statusText);
          }
          msg('密码已重置成功，即将跳转登录...');
          setTimeout(()=>goto('login.html'), 1000);
        }catch(e){ msg('重置失败：'+e.message, true); }
      });
    })();
  </script>
