<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
<script src="./theme-flash.js?v=20260515"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>注册账户 - 在线图片压缩工具，创建免费账户享受批量图片与视频压缩</title>
  <meta name="description" content="注册在线图片压缩工具账户，免费创建账号解锁视频压缩、云端批量处理等高级功能，仅需邮箱即可完成注册，快速开始使用。" />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="./shared.css?v=20260511d" />
  <style>
    :root{--bg:#f6f7fb;--card:#ffffff;--text:#0f172a;--muted:#64748b;--brand:#695CFF;--border:#e7e9f2;--shadow:0 10px 26px rgba(17,23,41,.08);} *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:14px/1.6 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Ubuntu,Arial,"Microsoft YaHei",sans-serif}
    a{color:var(--muted);text-decoration:none}
    .container{max-width:980px;margin:0 auto;padding:24px}
    .nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:12px 4px;border-bottom:1px solid var(--border)}
    .brand{display:flex;align-items:center;gap:10px}
    .brand .logo{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#9aa6ff 0%,#695CFF 100%);box-shadow:0 2px 10px rgba(105,92,255,.35)}
    .brand b{font-weight:700}
    .nav-links{display:flex;gap:18px}
    .card{max-width:640px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:16px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    label{display:block;color:var(--muted);margin:8px 0 6px}
    input[type=text],input[type=password]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;background:#fff;color:var(--text)}
    .btn{cursor:pointer;border:1px solid transparent;border-radius:9px;padding:10px 14px;font-weight:600;color:#fff;background:var(--brand)}
    .stack{display:flex;gap:10px;flex-wrap:wrap}
    .status{min-height:18px;color:var(--muted);margin-top:6px}
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand"><div class="logo"></div><b>ImageCompress</b></div>
      <div class="nav-links">
        <a href="javascript:;" id="nav-login">去登录</a>
        <a href="javascript:;" id="nav-home">返回首页</a>
      </div>
    </div>

    <section class="card">
      <h1 style="margin:0 0 8px;font-size:20px">注册账号</h1>
      <div class="row">
        <div style="flex:1">
          <label>呢称（可选）</label>
          <input id="reg-nickname" type="text" placeholder="你的显示名称" />
        </div>
      </div>
      <div class="row">
        <div style="flex:1">
          <label>账号（用户名）</label>
          <input id="reg-username" type="text" placeholder="仅字母/数字/下划线/连接符" />
        </div>
      </div>
      <div class="row">
        <div style="flex:1">
          <label>密码</label>
          <input id="reg-password" type="password" placeholder="至少 8 位" />
        </div>
      </div>
      <div class="muted" style="margin-top:8px; font-size:12px;">
        提示：注册后可前往个人中心绑定邮箱（需验证码），用于找回密码。
      </div>
      <div class="stack" style="margin-top:10px">
        <button id="btn-do-register" class="btn">注册并登录</button>
        <a class="btn" href="./login.html" style="background:#3b3f4b">已有账号？去登录</a>
      </div>
      <div id="reg-msg" class="status"></div>
    </section>

    <div class="footer" style="margin:28px 0 8px;text-align:center;color:#9aa3b2;font-size:12px">
      <nav style="margin-bottom:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:4px 14px">
        <a href="./" style="color:#9aa3b2;text-decoration:none">首页</a>
        <a href="./bg-change.html" style="color:#9aa3b2;text-decoration:none">证件照换底色</a>
        <a href="./watermark-remover.html" style="color:#9aa3b2;text-decoration:none">去水印</a>
        <a href="./changelog.html" style="color:#9aa3b2;text-decoration:none">更新日志</a>
        <a href="./feedback.html" style="color:#9aa3b2;text-decoration:none">反馈</a>
        <a href="./donate.html" style="color:#9aa3b2;text-decoration:none">赞助</a>
        <a href="./about.html" style="color:#9aa3b2;text-decoration:none">关于</a>
        <a href="./privacy.html" style="color:#9aa3b2;text-decoration:none">隐私政策</a>
      </nav>
      © 2025 ImageCompress. 版权所有。 <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none;">赣ICP备2025079690号-1</a>
    </div>
  </div>

  <script>
    (function(){
      // 载入 app.v2.js 以获得 API_BASE
      var s=document.createElement('script');
      s.src=(location.protocol==='file:'? './app.js?v=20260511b':'/app.js?v=20260511b');
      s.onload=function(){
        function msg(t,isErr){ var el=document.getElementById('reg-msg'); if(!el) return; el.textContent=t||''; el.style.color=isErr?'#f87171':''; }
        async function api(path, opts){
          const url=(window.API_BASE||'')+path; const res=await fetch(url,{...opts, headers:{'Accept':'application/json','Content-Type':'application/json',...(opts.headers||{})}});
          if(!res.ok){ let d=''; try{const j=await res.json(); d=j.detail||JSON.stringify(j)}catch{try{d=await res.text()}catch{}}; throw new Error(d||res.status+':'+res.statusText); }
          return res.json();
        }
        document.getElementById('btn-do-register')?.addEventListener('click', async function(){
          const nickname=(document.getElementById('reg-nickname')?.value||'').trim();
          const username=(document.getElementById('reg-username')?.value||'').trim();
          const email=(document.getElementById('reg-email')?.value||'').trim();
          const password=(document.getElementById('reg-password')?.value||'');
          if(!username||!password){ msg('请输入账号与密码',true); return; }
          if(password.length < 8){ msg('密码至少 8 位', true); return; }
          if(email && email.indexOf('@')<0){ msg('邮箱格式不正确', true); return; }
          try{
            await api('/api/v1/auth/register', { method:'POST', body: JSON.stringify({ username, password, nickname: nickname||null, email: email||null }) });
            const token = await api('/api/v1/auth/login', { method:'POST', body: JSON.stringify({ username_or_email: username, password })});
            localStorage.setItem('token', token.access_token);
            msg('注册并登录成功，正在跳转...');
            location.href=(location.protocol==='file:'? './index.html':'/index.html');
          }catch(e){ msg('注册失败：'+e.message, true); }
        });
        document.getElementById('nav-login')?.addEventListener('click', function(){ location.href=(location.protocol==='file:'? './login.html':'/login.html'); });
        document.getElementById('nav-home')?.addEventListener('click', function(){ location.href=(location.protocol==='file:'? './index.html':'/index.html'); });
      };
      document.head.appendChild(s);
    })();
  </script>
<script src="./menu.js?v=20260203"></script>
<script src="./theme.js?v=20260203"></script>
  <script src="./spark.js?v=20260515" defer></script>
  <script src="./stars.js?v=20260511b" defer></script>
</body>
</html>
